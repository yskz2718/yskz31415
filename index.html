<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Yasuda | Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #1f5f14, #555555);
      color: white;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      margin: 0;
      letter-spacing: 3px;
    }

    h2 {
      font-weight: 300;
      opacity: 0.8;
    }

    .btn {
      margin-top: 30px;
      padding: 12px 30px;
      border: 2px solid white;
      border-radius: 30px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: #203a43;
    }

    section {
      padding: 80px 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    footer {
      text-align: center;
      padding: 30px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<header>
  <h1>YASUDA</h1>
  <h2>Creative / Developer / Dreamer</h2>
  <a href="#about" class="btn">もっと見る</a>
</header>

<section id="about">
  <div class="card">
    <h2>About Me</h2>
    <p>
      はじめまして、やすだです。\n
      新しいことに挑戦するのが好きで、クリエイティブな発想とテクノロジーを組み合わせることに興味があります。
    </p>
  </div>

  <div class="card">
    <h2>Skills</h2>
    <ul>
      <li>Web Development</li>
      <li>Design</li>
      <li>Problem Solving</li>
    </ul>
  </div>

  <div class="card">
    <h2>Contact</h2>
    <p>your@email.com</p>
  </div>
</section>

<footer>
  © 2026 Yasuda
</footer>

</body>
</html>
